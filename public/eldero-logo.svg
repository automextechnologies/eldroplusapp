<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8C2009"/>
      <stop offset="100%" stop-color="#E84C1E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="28" fill="url(#bgG)"/>

  <!-- Left figure -->
  <circle cx="42" cy="26" r="10" fill="white"/>
  <path d="M32 38 Q42 34 52 38 L50 62 L34 62 Z" fill="white" opacity="0.92"/>
  <!-- arms crossed -->
  <path d="M30 50 Q42 44 54 50" stroke="white" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Right figure (ponytail) -->
  <circle cx="78" cy="26" r="10" fill="white"/>
  <path d="M86 18 C92 14 95 22 89 26" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M68 38 Q78 34 88 38 L86 62 L70 62 Z" fill="white" opacity="0.92"/>
  <path d="M66 50 Q78 44 90 50" stroke="white" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Lotus / leaf base -->
  <path d="M60 62 L60 82" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <!-- center petal -->
  <path d="M60 68 C60 68 52 58 60 50 C68 58 60 68 60 68Z" fill="white" opacity="0.95"/>
  <!-- left petal -->
  <path d="M60 76 C60 76 44 70 40 58 C48 54 58 66 60 76Z" fill="white" opacity="0.82"/>
  <!-- right petal -->
  <path d="M60 76 C60 76 76 70 80 58 C72 54 62 66 60 76Z" fill="white" opacity="0.82"/>
  <!-- bottom left petal -->
  <path d="M52 88 C48 84 46 78 52 76 C56 80 56 88 52 88Z" fill="white" opacity="0.62"/>
  <!-- bottom right petal -->
  <path d="M68 88 C72 84 74 78 68 76 C64 80 64 88 68 88Z" fill="white" opacity="0.62"/>

  <!-- Eldro+ text -->
  <text x="60" y="108" text-anchor="middle" fill="white"
        font-family="Arial Black, Arial, sans-serif"
        font-size="15" font-weight="900" letter-spacing="0.5">Eldro+</text>
</svg>
